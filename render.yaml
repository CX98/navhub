services:
  - type: web
    name: navhub-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false  # 需要手动填入 Supabase 连接字符串
      - key: JWT_SECRET
        generateValue: true
